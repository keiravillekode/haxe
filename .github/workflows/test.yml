name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        haxe-version: [4.2.5]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Haxe environment
        uses: krdlab/setup-haxe@23a78f711bc4a623db38eac90d351ff0027f0116
        with:
          haxe-version: ${{ matrix.haxe-version }}

      - name: Install testing framework
        run: haxelib install buddy

      - name: Install datetime for gigasecond
        run: haxelib install datetime

      - name: Compile test
        run: bin/build.sh
